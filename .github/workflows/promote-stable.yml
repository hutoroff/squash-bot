name: Promote to Stable

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to promote'
        required: true
        type: choice
        options:
          - management
          - telegram
          - booking
          - web
          - all
      version:
        description: 'Source tag to promote (e.g. 1.2.3). Defaults to latest.'
        required: false
        default: 'latest'

jobs:
  promote:
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Promote to stable
        run: |
          HUB="${{ vars.DOCKERHUB_USERNAME }}"
          VERSION="${{ inputs.version }}"

          promote() {
            local image="$1"
            echo "Promoting ${image}:${VERSION} → ${image}:stable"
            docker buildx imagetools create --tag "${image}:stable" "${image}:${VERSION}"
          }

          case "${{ inputs.service }}" in
            management) promote "${HUB}/squash-management" ;;
            telegram)   promote "${HUB}/squash-telegram-bot" ;;
            booking)    promote "${HUB}/squash-booking-eversports" ;;
            web)        promote "${HUB}/squash-web" ;;
            all)
              promote "${HUB}/squash-management"
              promote "${HUB}/squash-telegram-bot"
              promote "${HUB}/squash-booking-eversports"
              promote "${HUB}/squash-web"
              ;;
          esac
