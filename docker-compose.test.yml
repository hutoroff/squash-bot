# Isolated PostgreSQL instance for e2e tests.
# Runs on port 5433 to avoid conflicts with the dev database on 5432.
services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: squash_test
      POSTGRES_USER: squash_test
      POSTGRES_PASSWORD: squash_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squash_test -d squash_test"]
      interval: 2s
      timeout: 5s
      retries: 15
