version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: squash_bot
      POSTGRES_USER: squash_bot
      POSTGRES_PASSWORD: squash_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squash_bot -d squash_bot"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
