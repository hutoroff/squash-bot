services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: squash_bot
      POSTGRES_USER: squash_bot
      POSTGRES_PASSWORD: squash_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U squash_bot -d squash_bot"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "7432:5432"

  squash-games-management:
    build:
      context: .
      dockerfile: Dockerfile.management
    environment:
      DATABASE_URL: postgres://squash_bot:squash_bot@postgres:5432/squash_bot?sslmode=disable
      SERVER_PORT: "8080"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  telegram-squash-bot:
    build:
      context: .
      dockerfile: Dockerfile.telegram
    env_file: .env
    environment:
      MANAGEMENT_SERVICE_URL: http://squash-games-management:8080
    depends_on:
      squash-games-management:
        condition: service_healthy
    restart: unless-stopped

  sports-booking-service:
    build:
      context: .
      dockerfile: Dockerfile.booking
    environment:
      SERVER_PORT: "8081"
    env_file: .env
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  squash-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file: .env
    environment:
      SERVER_PORT: "8082"
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
